<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>网易云音乐 - Spring Autumn Sunset</title>
    <style>
        /* ================= 基础重置 ================= */
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            background: #333; 
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", Arial, sans-serif;
            display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden;
        }

        /* 隐藏滚动条 */
        ::-webkit-scrollbar { display: none; }

        /* ================= 手机模拟容器 ================= */
        .phone-frame {
            width: 375px; 
            height: 812px; 
            background: #1a1a1a;
            position: relative;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            border-radius: 40px;
            border: 8px solid #111;
            display: flex;
            flex-direction: column;
        }

        @media (max-width: 400px) {
            .phone-frame { width: 100vw; height: 100vh; border-radius: 0; border: none; }
        }

        /* ================= 背景图与毛玻璃遮罩 ================= */
        .bg-layer {
            position: absolute; top: -10%; left: -10%; width: 120%; height: 120%;
            background-image: url('网易云.png'); /* 使用同一张图作为背景 */
            background-size: cover; background-position: center;
            filter: blur(25px) brightness(0.4); /* 强模糊与暗化 */
            z-index: 0; pointer-events: none;
        }
        
        /* 顶部黑灰渐变遮罩，确保文字清晰 */
        .bg-gradient {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, rgba(0,0,0,0.4) 0%, transparent 20%, rgba(0,0,0,0.6) 80%, rgba(0,0,0,0.8) 100%);
            z-index: 1; pointer-events: none;
        }

        /* ================= 移动端顶部导航 ================= */
        .header {
            position: relative; z-index: 10; height: 64px; 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 0 16px; padding-top: 10px;
        }
        .header-icon { font-size: 24px; color: #fff; cursor: pointer; width: 30px; text-align: center; }
        .header-down { transform: rotate(90deg); display: inline-block; font-size: 20px;}
        
        .header-info { text-align: center; flex: 1; overflow: hidden; display: flex; flex-direction: column; align-items: center;}
        .song-name { font-size: 16px; color: #fff; font-weight: 500; white-space: nowrap; text-overflow: ellipsis; overflow: hidden; max-width: 200px; display: flex; align-items: center; gap: 4px;}
        .vip-tag { border: 1px solid #ff5a5a; color: #ff5a5a; font-size: 8px; padding: 0 3px; border-radius: 2px; font-weight: bold; transform: scale(0.9); }
        .artist-name { font-size: 12px; color: rgba(255,255,255,0.6); margin-top: 2px; display: flex; align-items: center; gap: 4px;}

        /* ================= 黑胶唱片区 ================= */
        .main-content {
            position: relative; z-index: 10; flex: 1; display: flex; flex-direction: column; align-items: center;
            overflow: hidden; padding-top: 20px;
        }

        /* 唱片机探针 */
        .stylus {
            position: absolute; top: -15px; left: 45%; 
            width: 100px; height: 140px;
            /* 用伪元素模拟探针外观 */
            background: transparent;
            z-index: 12;
            transform-origin: 15px 15px;
            transform: rotate(-30deg); /* 暂停状态的倾斜角度 */
            transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
        /* 播放状态时探针落下 */
        .stylus.playing { transform: rotate(0deg); }
        
        /* 探针轴承 */
        .stylus::before {
            content: ''; position: absolute; top: 0; left: 0;
            width: 30px; height: 30px; border-radius: 50%;
            background: radial-gradient(circle, #ddd 0%, #888 100%);
            box-shadow: 0 2px 5px rgba(0,0,0,0.5);
            z-index: 13;
        }
        /* 探针杆 */
        .stylus::after {
            content: ''; position: absolute; top: 15px; left: 13px;
            width: 4px; height: 110px; background: linear-gradient(to right, #ccc, #fff, #ccc);
            transform-origin: top; transform: rotate(20deg);
            border-radius: 2px; box-shadow: -2px 5px 5px rgba(0,0,0,0.3);
        }
        /* 探针头 */
        .stylus-head {
            position: absolute; top: 115px; left: 42px;
            width: 16px; height: 26px; background: #ddd;
            transform: rotate(20deg); border-radius: 4px;
            box-shadow: -1px 3px 5px rgba(0,0,0,0.4);
            border-bottom: 5px solid #666;
        }

        /* 黑胶唱片本体 */
        .vinyl-wrapper {
            width: 280px; height: 280px;
            background: rgba(0,0,0,0.2);
            border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            margin-top: 60px;
        }

        .vinyl {
            width: 270px; height: 270px;
            background: #0b0b0b;
            border-radius: 50%;
            box-shadow: 0 0 0 8px rgba(255,255,255,0.1), 0 10px 30px rgba(0,0,0,0.5);
            display: flex; justify-content: center; align-items: center;
            position: relative;
            animation: spin 25s linear infinite;
            animation-play-state: paused; /* 默认暂停 */
        }
        .vinyl.playing { animation-play-state: running; }
        
        /* 唱片光泽质感 */
        .vinyl::after {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            border-radius: 50%;
            background: conic-gradient(from 45deg, transparent 0deg, rgba(255,255,255,0.1) 30deg, transparent 60deg, transparent 180deg, rgba(255,255,255,0.1) 210deg, transparent 240deg);
            pointer-events: none;
        }

        /* 专辑封面图 */
        .album-cover {
            width: 180px; height: 180px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #000;
        }

        /* 单句歌词预览 */
        .lyric-preview {
            margin-top: 50px; font-size: 15px; color: rgba(255,255,255,0.9);
            text-align: center; letter-spacing: 1px; width: 80%;
            line-height: 1.5; text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        /* ================= 底部控制区 ================= */
        .bottom-controls {
            position: relative; z-index: 10; width: 100%; padding: 0 20px 30px 20px;
        }

        /* 交互功能栏 (喜欢、下载、评论等) */
        .action-bar {
            display: flex; justify-content: space-around; align-items: center; margin-bottom: 25px;
        }
        .action-btn {
            color: rgba(255,255,255,0.8); font-size: 24px; position: relative; cursor: pointer;
            text-decoration: none; display: flex; align-items: center; justify-content: center;
        }
        .action-btn:active { color: #fff; transform: scale(0.95); }
        .action-btn.liked { color: #ff5a5a; }
        
        .comment-badge {
            position: absolute; top: -5px; right: -12px;
            font-size: 9px; background: transparent; color: #fff;
            transform: scale(0.9); text-shadow: 0 1px 2px rgba(0,0,0,0.8);
        }

        /* 进度条栏 */
        .progress-bar {
            display: flex; align-items: center; gap: 10px; margin-bottom: 20px; font-size: 10px; color: rgba(255,255,255,0.5);
        }
        .slider-bg {
            flex: 1; height: 2px; background: rgba(255,255,255,0.2); border-radius: 1px; position: relative;
        }
        .slider-fill {
            position: absolute; top: 0; left: 0; width: 0%; height: 100%; background: #fff; border-radius: 1px;
        }
        .slider-dot {
            position: absolute; top: -3px; right: -4px; width: 8px; height: 8px;
            background: #fff; border-radius: 50%; box-shadow: 0 0 4px rgba(0,0,0,0.3);
            display: none; /* 仅在播放时显示 */
        }
        .slider-bg:active .slider-dot { width: 12px; height: 12px; top: -5px; right: -6px; }

        /* 播放控制栏 */
        .playback-controls {
            display: flex; justify-content: space-between; align-items: center; padding: 0 10px;
        }
        .play-btn {
            font-size: 20px; color: rgba(255,255,255,0.8); cursor: pointer;
        }
        .play-btn:active { color: #fff; }
        
        .play-center {
            width: 60px; height: 60px; border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.8);
            display: flex; justify-content: center; align-items: center;
            font-size: 24px; color: rgba(255,255,255,0.9); cursor: pointer;
            transition: 0.1s;
        }
        .play-center:active { background: rgba(255,255,255,0.1); border-color: #fff; color: #fff; }

        @keyframes spin {
            100% { transform: rotate(360deg); }
        }

    </style>
</head>
<body>

    <!-- 隐藏的音频播放器 -->
    <audio id="audioPlayer" src="Spring-Autumn-Sunset-chosic.com_.mp3"></audio>

    <div class="phone-frame">
        
        <!-- 全屏背景层 -->
        <div class="bg-layer"></div>
        <div class="bg-gradient"></div>

        <!-- 顶部导航 -->
        <header class="header">
            <div class="header-icon"><span class="header-down">‹</span></div>
            <div class="header-info">
                <div class="song-name">Spring Autumn Sunset <span class="vip-tag">VIP</span></div>
                <div class="artist-name">Artificial.Music <span>›</span></div>
            </div>
            <div class="header-icon">⍈</div>
        </header>

        <!-- 中间黑胶唱片与歌词 -->
        <main class="main-content">
            <!-- 探针 -->
            <div class="stylus" id="stylus">
                <div class="stylus-head"></div>
            </div>
            
            <!-- 旋转唱片 -->
            <div class="vinyl-wrapper">
                <div class="vinyl" id="vinyl">
                    <!-- 使用网易云.png作为封面 -->
                    <img src="网易云.png" class="album-cover" alt="封面">
                </div>
            </div>

            <!-- 单句歌词预览 -->
            <div class="lyric-preview">
                Wish I could be with you forever.
            </div>
        </main>

        <!-- 底部控制区 -->
        <footer class="bottom-controls">
            
            <!-- 交互栏 -->
            <div class="action-bar">
                <div class="action-btn like-btn" onclick="toggleLike(this)">♡</div>
                <div class="action-btn">⬇</div>
                <div class="action-btn">🔔</div>
                <!-- 核心解谜入口：跳转评论页 -->
                <a href="comments.html" class="action-btn">
                    💬 <span class="comment-badge">999+</span>
                </a>
                <div class="action-btn">⋮</div>
            </div>

            <!-- 进度条 -->
            <div class="progress-bar">
                <span id="currentTime">00:00</span>
                <div class="slider-bg">
                    <div class="slider-fill" id="progressFill">
                        <div class="slider-dot" id="progressDot"></div>
                    </div>
                </div>
                <span id="duration">03:24</span> <!-- 根据实际音频长度设定，这里写死作展示 -->
            </div>

            <!-- 播放控制 -->
            <div class="playback-controls">
                <div class="play-btn">🔁</div>
                <div class="play-btn">⏮</div>
                <div class="play-center" id="playBtn">▶</div>
                <div class="play-btn">⏭</div>
                <div class="play-btn">☰</div>
            </div>

        </footer>
    </div>

    <!-- 播放逻辑脚本 -->
    <script>
        const audio = document.getElementById('audioPlayer');
        const playBtn = document.getElementById('playBtn');
        const vinyl = document.getElementById('vinyl');
        const stylus = document.getElementById('stylus');
        const progressFill = document.getElementById('progressFill');
        const progressDot = document.getElementById('progressDot');
        const currentTimeEl = document.getElementById('currentTime');
        
        let isPlaying = false;

        // 点击播放/暂停切换
        playBtn.addEventListener('click', () => {
            if (isPlaying) {
                audio.pause();
                playBtn.innerHTML = '▶'; 
                vinyl.classList.remove('playing');
                stylus.classList.remove('playing');
                progressDot.style.display = 'none';
            } else {
                audio.play();
                playBtn.innerHTML = '⏸'; 
                vinyl.classList.add('playing');
                stylus.classList.add('playing');
                progressDot.style.display = 'block';
            }
            isPlaying = !isPlaying;
        });

        // 更新进度条
        audio.addEventListener('timeupdate', () => {
            if(audio.duration) {
                const progressPercent = (audio.currentTime / audio.duration) * 100;
                progressFill.style.width = progressPercent + '%';
                
                // 格式化当前时间
                const mins = Math.floor(audio.currentTime / 60);
                const secs = Math.floor(audio.currentTime % 60);
                currentTimeEl.innerText = `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
            }
        });

        // 监听音频播放结束，自动重置状态
        audio.addEventListener('ended', () => {
            isPlaying = false;
            playBtn.innerHTML = '▶';
            vinyl.classList.remove('playing');
            stylus.classList.remove('playing');
            progressFill.style.width = '0%';
            progressDot.style.display = 'none';
            currentTimeEl.innerText = "00:00";
        });

        // 爱心点赞交互
        function toggleLike(el) {
            if (el.innerText === '♡') {
                el.innerText = '♥';
                el.classList.add('liked');
            } else {
                el.innerText = '♡';
                el.classList.remove('liked');
            }
        }
    </script>
</body>
</html>
