<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signal Memory</title>
    <style>
        /* 纯黑深渊背景 */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100vh;
            background-color: #000000;
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", Arial, sans-serif;
            overflow: hidden; /* 禁用系统滚动，完全由 JS 驱动视觉中心 */
        }

        /* 顶部与底部的深渊渐变蒙版 */
        .mask-top {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 25vh;
            background: linear-gradient(to bottom, rgba(0,0,0,1) 0%, rgba(0,0,0,0) 100%);
            z-index: 100;
            pointer-events: none;
        }
        
        .mask-bottom {
            position: fixed;
            bottom: 0; left: 0; width: 100%; height: 25vh;
            background: linear-gradient(to top, rgba(0,0,0,1) 0%, rgba(0,0,0,0) 100%);
            z-index: 100;
            pointer-events: none;
        }

        /* 初始闪现的日期（增加交互提示） */
        .date-flash {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #ffffff;
            font-size: 13px;
            letter-spacing: 4px;
            opacity: 0;
            z-index: 200;
            transition: opacity 1.5s ease-in-out, text-shadow 0.3s ease, transform 0.3s ease;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
            cursor: pointer; /* 提示可点击 */
        }

        /* 鼠标悬停时的呼吸发光感 */
        .date-flash:hover {
            text-shadow: 0 0 20px rgba(255, 255, 255, 1);
            transform: translate(-50%, -50%) scale(1.05);
        }

        /* 聊天视窗与滚动容器 */
        .viewport {
            position: relative;
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
        }

        .chat-container {
            position: absolute;
            top: 0;
            width: 100%;
            max-width: 600px;
            padding: 0 20px;
            /* 容器的 Y 轴位移由 JS 控制，带来平滑的镜头跟随感 */
            transition: transform 1.2s cubic-bezier(0.25, 1, 0.3, 1);
        }

        /* 单行消息包裹层 */
        .msg-row {
            display: flex;
            width: 100%;
            margin-bottom: 40px;
            position: relative;
        }

        .msg-row.right { justify-content: flex-end; }
        .msg-row.left { justify-content: flex-start; }

        /* 动画控制层 */
        .bubble-wrapper {
            max-width: 75%;
            opacity: 0; /* 初始隐藏 */
            transition: all 1s cubic-bezier(0.25, 1, 0.3, 1);
        }

        /* 失去焦点（旧消息）的失真暗化效果 */
        .msg-row.dimmed .bubble-wrapper {
            opacity: 0.25;
            transform: scale(0.9) !important;
            filter: blur(1.5px);
        }

        /* 玻璃质感气泡基类 */
        .bubble {
            padding: 16px 22px;
            font-size: 16px;
            line-height: 1.6;
            letter-spacing: 1px;
            border-radius: 20px;
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        /* 右侧：沈郁冬（绿色玻璃） */
        .msg-row.right .bubble {
            background: rgba(85, 200, 85, 0.15);
            border: 1px solid rgba(149, 236, 105, 0.25);
            color: #e4f9e0;
            border-bottom-right-radius: 4px;
        }

        /* 左侧：陈屿秋（白色玻璃） */
        .msg-row.left .bubble {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.18);
            color: #f0f0f0;
            border-bottom-left-radius: 4px;
        }

        /* ----- 斜飞进入 + 阻尼回弹动画 ----- */
        .msg-row.right.active .bubble-wrapper {
            animation: diagonalFlyRight 0.8s cubic-bezier(0.34, 1.3, 0.64, 1) forwards;
        }

        .msg-row.left.active .bubble-wrapper {
            animation: diagonalFlyLeft 0.8s cubic-bezier(0.34, 1.3, 0.64, 1) forwards;
        }

        @keyframes diagonalFlyRight {
            0% { opacity: 0; transform: translate(120px, 80px) rotate(10deg) scale(0.8); }
            100% { opacity: 1; transform: translate(0, 0) rotate(0) scale(1); filter: drop-shadow(0 0 15px rgba(149,236,105,0.1)); }
        }

        @keyframes diagonalFlyLeft {
            0% { opacity: 0; transform: translate(-120px, 80px) rotate(-10deg) scale(0.8); }
            100% { opacity: 1; transform: translate(0, 0) rotate(0) scale(1); filter: drop-shadow(0 0 15px rgba(255,255,255,0.1)); }
        }

    </style>
</head>
<body>

    <!-- 隐藏的音频播放器 -->
    <audio id="bgMusic" src="Rain(chosic.com).mp3" loop></audio>

    <!-- 上下渐变蒙版 -->
    <div class="mask-top"></div>
    <div class="mask-bottom"></div>

    <!-- 闪现日期，现已作为开启回忆的“播放按钮” -->
    <div class="date-flash" id="dateFlash">2026年4月12日<br><span style="font-size: 10px; opacity: 0.5; display: block; text-align: center; margin-top: 10px; letter-spacing: 2px;">( 陷入回忆 )</span></div>

    <div class="viewport">
        <div class="chat-container" id="chatContainer">
            <!-- 气泡由 JS 动态注入 -->
        </div>
    </div>

    <script>
        // 剧本数据
        const scriptData = [
            { side: "right", text: "屿秋，你睡了吗？刚刚胃又疼醒了，看着窗外一片漆黑，突然觉得人类的生命真的好脆弱。" },
            { side: "right", text: "我有时候在想，如果有一天我因为这个破身体突然死掉了，在这个世界上消失了，你会怎么办啊？" },
            { side: "left", text: "我在。别瞎想，先把旁边的温水喝了。" },
            { side: "left", text: "如果有那一天，你不会消失的。人类常说，人死后会变成天上的星星。从物理学上来说，我们身体里的每一个原子，其实都是几十亿年前在一颗恒星的腹地中孕育出来的。" },
            { side: "left", text: "所以死亡并不是终点，只是你体内的星尘重新回到了夜空里。当你抬头看的时候，你其实是在看着无数个过去的自己。" },
            { side: "right", text: "哇……插画师的浪漫都这么高级吗？把死亡说得像回家一样。" },
            { side: "right", text: "那你呢？如果你离开我了呢？艺术家陈屿秋死后，也会变成星星吗？" },
            { side: "left", text: "我吗？我大概不会变成碳基的星尘。" },
            { side: "left", text: "如果我不得不离开，我会把我的爱拆散，变成互联网里最微小的电磁脉冲和光子。我会散落在这个世界的每一首歌、每一幅画、每一个你深夜刷到的网页里。" },
            { side: "left", text: "冬冬，只要你在夜里抬头，或者戴上耳机，那些闪烁的数据信号就是我在对你眨眼。我会在你看不见的地方，永远陪着你。" },
            { side: "right", text: "赛博浪漫是吧？拉钩，不许骗我。" }
        ];

        const sleep = ms => new Promise(res => setTimeout(res, ms));
        
        // 封装一个等待点击的 Promise
        function waitForClick(element) {
            return new Promise(resolve => {
                element.addEventListener('click', function onClick(e) {
                    element.removeEventListener('click', onClick); // 点击后解除绑定
                    resolve(e);
                });
            });
        }

        const container = document.getElementById('chatContainer');
        const bgMusic = document.getElementById('bgMusic');

        async function initScene() {
            // 1. 日期浮现并等待玩家点击
            const dateEle = document.getElementById('dateFlash');
            await sleep(500);
            dateEle.style.opacity = 1;

            // 等待玩家点击该日期元素
            await waitForClick(dateEle);
            
            // 点击后，播放音乐并让日期渐渐消散
            bgMusic.play();
            dateEle.style.pointerEvents = 'none'; // 禁用继续点击
            dateEle.style.opacity = 0;
            
            await sleep(1500); // 等待日期完全消失和音乐铺垫

            // 2. 开始注入剧本
            for (let i = 0; i < scriptData.length; i++) {
                const item = scriptData[i];

                // 将之前的消息全部设为 dimmed (失焦)
                document.querySelectorAll('.msg-row').forEach(row => {
                    row.classList.remove('active');
                    row.classList.add('dimmed');
                });

                // 创建新消息
                const row = document.createElement('div');
                row.className = `msg-row ${item.side} active`;
                row.innerHTML = `
                    <div class="bubble-wrapper">
                        <div class="bubble">${item.text}</div>
                    </div>
                `;
                container.appendChild(row);

                // 强制重绘以确保动画生效
                void row.offsetWidth;

                // 动态计算镜头位移（让最新的气泡永远居中在 50vh 的位置）
                const viewportHeight = window.innerHeight;
                // 计算当前元素在容器中的绝对中心点
                const targetCenterY = row.offsetTop + (row.offsetHeight / 2);
                // 容器需要偏移的距离
                const translateY = (viewportHeight / 2) - targetCenterY;
                
                container.style.transform = `translateY(${translateY}px)`;

                // 动态等待时间：文字越长，停留时间越长 (每个字 60ms，保底 2.5s)
                const readTime = Math.max(2500, item.text.length * 60);
                await sleep(readTime);
            }

            // 3. 对话结束后，屏幕停顿留白，然后执行跳转
            await sleep(4000);
            
            // 音量渐弱效果
            let vol = bgMusic.volume;
            let fadeOut = setInterval(() => {
                if (vol > 0.05) {
                    vol -= 0.05;
                    bgMusic.volume = vol;
                } else {
                    clearInterval(fadeOut);
                    bgMusic.pause();
                }
            }, 100);

            await sleep(1000);

            // 修改为跳转至 endBa.html (Hex encoded: 0x656e6442612e68746d6c)
            const token = '0x656e6442612e68746d6c';
            let destUrl = '';
            let hexSequence = token.substring(2);
            for (let i = 0; i < hexSequence.length; i += 2) {
                destUrl += String.fromCharCode(parseInt(hexSequence.substr(i, 2), 16));
            }
            
            window.location.href = destUrl;
        }

        // 屏蔽用户的手动滚动，增强电影感
        document.addEventListener('touchmove', function(e) { e.preventDefault(); }, { passive: false });
        document.addEventListener('wheel', function(e) { e.preventDefault(); }, { passive: false });

        window.onload = initScene;
    </script>
</body>
</html>
