<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>屿秋 - 网易云音乐</title>
    <style>
        /* ================= 基础重置 ================= */
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            background: #333; 
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", Arial, sans-serif;
            display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden;
        }
        ul { list-style: none; }

        /* 隐藏全局滚动条 */
        ::-webkit-scrollbar { display: none; }

        /* ================= 手机模拟容器 ================= */
        .phone-frame {
            width: 375px; 
            height: 812px; 
            background: #111; /* 深色主题底层背景 */
            position: relative;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            border-radius: 40px;
            border: 8px solid #000;
            display: flex;
            flex-direction: column;
            color: #d0d0d0;
        }

        @media (max-width: 400px) {
            .phone-frame { width: 100vw; height: 100vh; border-radius: 0; border: none; }
        }

        /* ================= 顶部导航与背景墙 ================= */
        .header-bg {
            position: relative;
            width: 100%; height: 280px;
            overflow: hidden;
            flex-shrink: 0;
        }

        .bg-img {
            position: absolute; top: -10%; left: -10%; width: 120%; height: 120%;
            background-image: url('网易云.png');
            background-size: cover;
            background-position: center;
            filter: blur(15px) brightness(0.6);
            z-index: 0;
        }

        /* 移动端吸顶透明导航栏 */
        .top-nav {
            position: absolute; top: 0; left: 0; width: 100%;
            height: 60px; padding: 10px 16px 0;
            display: flex; justify-content: space-between; align-items: center;
            z-index: 10;
        }
        .nav-btn { font-size: 24px; color: #fff; cursor: pointer; text-shadow: 0 1px 2px rgba(0,0,0,0.5);}

        /* 背景墙内的用户信息 */
        .header-info-layer {
            position: absolute; bottom: 0; left: 0; width: 100%;
            padding: 20px 16px;
            background: linear-gradient(to top, rgba(17,17,17,1) 0%, transparent 100%);
            z-index: 5;
            display: flex; flex-direction: column; gap: 12px;
        }

        .avatar-row {
            display: flex; justify-content: space-between; align-items: flex-end;
        }

        .avatar {
            width: 80px; height: 80px; border-radius: 50%;
            background: #333 url('陈屿秋.jpg') center/cover no-repeat;
            border: 2px solid rgba(255,255,255,0.2);
        }

        .action-btns {
            display: flex; gap: 10px; margin-bottom: 10px;
        }
        .action-btns button {
            background: rgba(255,255,255,0.15); border: none;
            color: #fff; padding: 6px 16px; border-radius: 20px;
            font-size: 13px; font-weight: 500; backdrop-filter: blur(5px);
        }
        .action-btns .btn-follow { background: #ff3a3a; color: #fff;}

        /* ================= 资料内容区 ================= */
        .scroll-content {
            flex: 1;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            background: #111;
            padding-bottom: 30px;
        }

        .profile-details {
            padding: 10px 16px 20px;
            border-bottom: 8px solid #1a1a1a;
        }

        .user-name { font-size: 22px; color: #fff; font-weight: bold; margin-bottom: 6px;}
        .user-meta { display: flex; gap: 15px; font-size: 13px; color: #999; margin-bottom: 12px;}
        .user-meta span { display: flex; gap: 4px; }
        .meta-num { color: #fff; font-weight: bold; }

        .auth-tag { 
            display: inline-block; font-size: 11px; color: #ff3a3a; 
            border: 1px solid rgba(255, 58, 58, 0.4); background: rgba(255, 58, 58, 0.1);
            padding: 2px 6px; border-radius: 4px; margin-bottom: 12px;
        }

        .tags-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px;}
        .tag { 
            background: #222; color: #aaa; font-size: 11px; 
            padding: 4px 10px; border-radius: 12px; 
        }

        .signature { font-size: 13px; color: #bbb; line-height: 1.5; }

        /* ================= 模块通用样式 ================= */
        .section-block {
            background: #111;
            border-bottom: 8px solid #1a1a1a;
        }
        .section-header {
            padding: 16px;
            font-size: 16px; font-weight: bold; color: #fff;
        }

        /* 播客/电台卡片 */
        .podcast-card {
            display: flex; gap: 12px; padding: 0 16px 20px;
        }
        .pc-cover {
            width: 70px; height: 70px; border-radius: 6px; overflow: hidden;
            flex-shrink: 0; background: #222;
        }
        .pc-cover img { width: 100%; height: 100%; object-fit: cover; }
        .pc-info { flex: 1; display: flex; flex-direction: column; justify-content: center; }
        .pc-title { font-size: 15px; color: #fff; margin-bottom: 6px; }
        .pc-meta { font-size: 12px; color: #888; margin-bottom: 4px;}
        .pc-desc { font-size: 12px; color: #888; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

        /* 歌单列表 */
        .playlist-item {
            display: flex; align-items: center; gap: 12px; padding: 10px 16px;
        }
        .pl-cover {
            width: 55px; height: 55px; border-radius: 6px; overflow: hidden;
            flex-shrink: 0; position: relative; background: #222;
        }
        .pl-cover img { width: 100%; height: 100%; object-fit: cover; }
        .pl-info { flex: 1; }
        .pl-title { font-size: 15px; color: #e0e0e0; margin-bottom: 4px; display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical; overflow: hidden;}
        .pl-meta { font-size: 12px; color: #888; }
        
    </style>
</head>
<body>

    <div class="phone-frame">
        
        <!-- 背景墙区域 -->
        <div class="header-bg">
            <!-- 顶部导航 -->
            <div class="top-nav">
                <div class="nav-btn" onclick="history.back()">‹</div>
                <div class="nav-btn">⋮</div>
            </div>
            
            <div class="bg-img"></div>
            
            <div class="header-info-layer">
                <div class="avatar-row">
                    <div class="avatar"></div>
                    <div class="action-btns">
                        <button class="btn-msg">发私信</button>
                        <button class="btn-follow">+ 关注</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- 页面滚动内容区 -->
        <div class="scroll-content">
            
            <!-- 用户详情 -->
            <div class="profile-details">
                <div class="user-name">屿秋</div>
                
                <div class="user-meta">
                    <span><span class="meta-num">1</span> 关注</span>
                    <span style="color: #444;">|</span>
                    <span><span class="meta-num">1204</span> 粉丝</span>
                    <span style="color: #444;">|</span>
                    <span>Lv.8</span>
                </div>

                <div class="auth-tag">网易音乐人 / 独立插画师</div>

                <div class="tags-row">
                    <span class="tag">#江城</span>
                    <span class="tag">#巨蟹座</span>
                    <span class="tag" style="color: #58a6ff; background: rgba(88,166,255,0.1);">#极夜回声</span>
                    <span class="tag">#环境音采样</span>
                </div>

                <div class="signature">在江城的雨夜里，画一组没有尽头的星空。<br>试图收集那些能让人平静下来的频率，也收集回声。</div>
            </div>

            <!-- 专属电台模块 -->
            <div class="section-block">
                <div class="section-header">播客 (1)</div>
                <div class="podcast-card">
                    <div class="pc-cover">
                        <!-- 复用背景图 -->
                        <img src="网易云.png" alt="极夜回声电台封面" onerror="this.style.display='none'">
                    </div>
                    <div class="pc-info">
                        <div class="pc-title">极夜回声</div>
                        <div class="pc-meta">共 2 期节目</div>
                        <div class="pc-desc">专属声场备份。极夜再长，也总会有回声的。这里记录了江城的雨，和治愈胃痛的碎碎念。</div>
                    </div>
                </div>
            </div>

            <!-- 歌单模块 -->
            <div class="section-block">
                <div class="section-header">创建的歌单 (4)</div>
                
                <div class="playlist-item">
                    <div class="pl-cover">
                        <div style="width:100%; height:100%; background: linear-gradient(135deg, #2b5876 0%, #4e4376 100%);"></div>
                    </div>
                    <div class="pl-info">
                        <div class="pl-title">深海潜航 // 沉浸式绘画作业用BGM</div>
                        <div class="pl-meta">32首，播放12.5万次</div>
                    </div>
                </div>

                <div class="playlist-item">
                    <div class="pl-cover">
                        <div style="width:100%; height:100%; background: linear-gradient(135deg, #141e30 0%, #243b55 100%);"></div>
                    </div>
                    <div class="pl-info">
                        <div class="pl-title">432Hz 宇宙镇痛频率 (防焦虑专用)</div>
                        <div class="pl-meta">18首，播放8.2万次</div>
                    </div>
                </div>

                <div class="playlist-item">
                    <div class="pl-cover">
                        <div style="width:100%; height:100%; background: linear-gradient(135deg, #42275a 0%, #734b6d 100%);"></div>
                    </div>
                    <div class="pl-info">
                        <div class="pl-title">白噪音与环境音合集</div>
                        <div class="pl-meta">45首，播放2.1万次</div>
                    </div>
                </div>

                <div class="playlist-item">
                    <div class="pl-cover">
                        <div style="width:100%; height:100%; background: linear-gradient(135deg, #0f2027 0%, #203a43 50%, #2c5364 100%);"></div>
                    </div>
                    <div class="pl-info">
                        <div class="pl-title">私密歌单</div>
                        <div class="pl-meta">12首</div>
                    </div>
                </div>

            </div>

        </div>
    </div>

</body>
</html>
