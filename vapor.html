<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vapor 社区</title>
    <style>
        /* ================= 全局样式重置 ================= */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #333; /* 外围背景，衬托手机框 */
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* 隐藏全局滚动条但保留滚动功能 */
        ::-webkit-scrollbar { display: none; }

        /* ================= 手机模拟容器 ================= */
        .phone-frame {
            width: 375px; 
            height: 812px; 
            background: #171a21;
            position: relative;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            border-radius: 40px;
            border: 8px solid #111;
            display: flex;
            flex-direction: column;
        }

        @media (max-width: 400px) {
            .phone-frame { width: 100vw; height: 100vh; border-radius: 0; border: none; }
        }

        /* ================= App 内容区 ================= */
        .vapor-content {
            flex-grow: 1;
            background: radial-gradient(circle at top center, #2a475e 0%, #1b2838 50%, #171a21 100%);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            color: #c7d5e0;
            padding-bottom: 20px;
        }

        /* 移动端顶部导航栏 */
        .mobile-header {
            height: 60px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 16px;
            padding-top: 10px;
            background-color: rgba(23, 26, 33, 0.9);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .menu-icon { font-size: 24px; color: #dfdfdf; cursor: pointer; }
        
        .vapor-logo {
            font-size: 20px;
            font-weight: bold;
            color: #dfdfdf;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .vapor-logo-icon {
            width: 24px;
            height: 24px;
            background: linear-gradient(-45deg, #000000 0%, #3a3a3a 100%);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 2px solid #dfdfdf;
            font-size: 12px;
        }

        .header-avatar {
            width: 28px;
            height: 28px;
            background-color: #4c6b82;
            border-radius: 4px;
            border: 1px solid #66c0f4;
        }

        /* 搜索区域 */
        .search-container {
            padding: 16px;
        }

        .community-title {
            font-size: 22px;
            color: #ffffff;
            font-weight: normal;
            margin-bottom: 12px;
        }

        .vapor-search {
            background-color: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(0, 0, 0, 0.6);
            border-radius: 4px;
            padding: 8px 12px;
            width: 100%;
            color: #fff;
            display: flex;
            align-items: center;
            position: relative;
        }

        .vapor-search input {
            background: transparent;
            border: none;
            color: #fff;
            width: 100%;
            outline: none;
            font-size: 14px;
        }

        .vapor-search:focus-within {
            border-color: #66c0f4;
            box-shadow: 0 0 5px rgba(102, 192, 244, 0.5);
        }
        
        .search-icon { cursor: pointer; font-size: 16px; }

        /* 内容分类标签 (支持横向滑动) */
        .content-tabs {
            display: flex;
            gap: 8px;
            padding: 0 16px 12px 16px;
            overflow-x: auto;
            white-space: nowrap;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            -webkit-overflow-scrolling: touch; /* 开启移动端顺滑滚动 */
            scrollbar-width: none; /* Firefox 隐藏滚动条 */
        }

        /* Webkit 内核 (Chrome/Safari/微信) 隐藏横向滚动条 */
        .content-tabs::-webkit-scrollbar {
            display: none; 
        }

        /* 修复滑到最右侧时丢失边距的问题 */
        .content-tabs::after {
            content: '';
            padding-right: 8px;
        }

        .content-tab {
            background-color: rgba(103, 193, 245, 0.2);
            color: #66c0f4;
            padding: 6px 14px;
            border-radius: 4px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
            flex-shrink: 0; /* 【关键修复】防止标签文字被挤压变形或显示不全 */
        }

        .content-tab.active { background-color: #66c0f4; color: #171a21; font-weight: bold; }

        /* 卡片流式列表 (单列) */
        .feed-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
            padding: 16px;
        }

        .feed-card {
            background-color: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 6px;
            overflow: hidden;
        }

        .card-header {
            padding: 12px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 14px;
        }

        .avatar { width: 36px; height: 36px; background-color: #4c6b82; border-radius: 4px; border: 1px solid #1b2838; }
        
        .user-info { display: flex; flex-direction: column; }
        .user-name { color: #fff; font-weight: 500; }
        .game-name { color: #8f98a0; font-size: 12px; margin-top: 2px;}

        .card-image {
            width: 100%;
            height: 200px;
            background: linear-gradient(135deg, #2a475e 0%, #171a21 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            color: #4c6b82;
            font-size: 13px;
            border-top: 1px solid #000;
            border-bottom: 1px solid #000;
        }

        .card-footer {
            padding: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #8f98a0;
            font-size: 13px;
            background-color: rgba(0,0,0,0.2);
        }

        .interactions { display: flex; gap: 16px; }
        .interaction-item { display: flex; align-items: center; gap: 6px; }

        /* ================= App底部导航栏 ================= */
        .bottom-nav {
            height: 60px;
            background-color: #171a21;
            border-top: 1px solid #2a475e;
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding-bottom: 5px; /* 适配全面屏底部 */
            flex-shrink: 0;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #8f98a0;
            font-size: 10px;
            gap: 4px;
            cursor: pointer;
        }

        .nav-item .icon { font-size: 22px; }
        .nav-item.active { color: #66c0f4; }
    </style>
</head>
<body>

    <!-- 模拟手机外框 -->
    <div class="phone-frame">
        
        <!-- App 内容区 -->
        <div class="vapor-content">
            
            <!-- 移动端顶部 -->
            <div class="mobile-header">
                <div class="menu-icon">☰</div>
                <div class="vapor-logo">
                    <div class="vapor-logo-icon">V</div> VAPOR
                </div>
                <div class="header-avatar"></div>
            </div>

            <!-- 搜索区 -->
            <div class="search-container">
                <h1 class="community-title">社区动态</h1>
                <div class="vapor-search">
                    <input type="text" id="vaporSearchInput" placeholder="搜索玩家、群组或游戏..." autocomplete="off">
                    <span class="search-icon" id="searchBtn">🔍</span>
                </div>
            </div>

            <!-- 内容分类 (横向滑动) -->
            <div class="content-tabs">
                <div class="content-tab active">全部</div>
                <div class="content-tab">截图</div>
                <div class="content-tab">艺术作品</div>
                <div class="content-tab">直播</div>
                <div class="content-tab">视频</div>
                <div class="content-tab">创意工坊</div>
                <div class="content-tab">新闻</div>
            </div>

            <!-- 卡片列表 (单列流式) -->
            <div class="feed-list">
                
                <div class="feed-card">
                    <div class="card-header">
                        <div class="avatar" style="background: #a35b45;"></div>
                        <div class="user-info">
                            <span class="user-name">GabeN_Fan</span>
                            <span class="game-name">反恐精英 2</span>
                        </div>
                    </div>
                    <div class="card-image">
                        [ 截图占位 ]
                    </div>
                    <div class="card-footer">
                        <div class="interactions">
                            <div class="interaction-item">👍 245</div>
                            <div class="interaction-item">💬 32</div>
                        </div>
                        <div>3 小时前</div>
                    </div>
                </div>

                <div class="feed-card">
                    <div class="card-header">
                        <div class="avatar" style="background: #568a5c;"></div>
                        <div class="user-info">
                            <span class="user-name">NightCityLegend</span>
                            <span class="game-name">赛博朋克 2077</span>
                        </div>
                    </div>
                    <div class="card-image" style="background: linear-gradient(135deg, #591b35 0%, #171a21 100%);">
                        [ 艺术作品占位 ]
                    </div>
                    <div class="card-footer">
                        <div class="interactions">
                            <div class="interaction-item">👍 1.2k</div>
                            <div class="interaction-item">💬 89</div>
                        </div>
                        <div>5 小时前</div>
                    </div>
                </div>

                <div class="feed-card">
                    <div class="card-header">
                        <div class="avatar" style="background: #8f7936;"></div>
                        <div class="user-info">
                            <span class="user-name">Tarnished_One</span>
                            <span class="game-name">艾尔登法环</span>
                        </div>
                    </div>
                    <div class="card-image" style="background: linear-gradient(135deg, #4a4225 0%, #171a21 100%);">
                        [ 成就解锁 ]
                    </div>
                    <div class="card-footer">
                        <div class="interactions">
                            <div class="interaction-item">👍 450</div>
                            <div class="interaction-item">💬 12</div>
                        </div>
                        <div>8 小时前</div>
                    </div>
                </div>

            </div>
        </div>

        <!-- App 底部导航 -->
        <div class="bottom-nav">
            <div class="nav-item">
                <div class="icon">🛒</div>
                <span>商店</span>
            </div>
            <div class="nav-item active">
                <div class="icon">🌍</div>
                <span>社区</span>
            </div>
            <div class="nav-item">
                <div class="icon">💬</div>
                <span>聊天</span>
            </div>
            <div class="nav-item">
                <div class="icon">🛡️</div>
                <span>令牌</span>
            </div>
        </div>

    </div>

    <!-- 加密搜索与跳转脚本 -->
    <script>
        const searchInput = document.getElementById('vaporSearchInput');
        const searchBtn = document.getElementById('searchBtn');

        // 
        function decodeData(b64) {
            try {
                return decodeURIComponent(escape(atob(b64)));
            } catch(e) {
                return '';
            }
        }

        function executeSearch() {
            const query = searchInput.value.trim();
            if (query === '') return;

            // 
            const encryptedQuery = btoa(unescape(encodeURIComponent(query)));

            // 
            // 
            // 
            const secretMap = {
                '5YyX5p6B5pif54mp6K+t': 'bW9kLmh0bWw='
            };

            const targetB64 = secretMap[encryptedQuery];

            if (targetB64) {
                // 
                const destUrl = decodeData(targetB64);
                window.location.href = destUrl; // 移动端通常在当前页跳转
            } else {
                // 
                alert("未找到关于 '" + query + "' 的社区内容。");
            }
        }

        // 绑定搜索按钮点击
        searchBtn.addEventListener('click', executeSearch);

        // 绑定回车/手机键盘前往键搜索
        searchInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                searchInput.blur(); // 收起手机键盘
                executeSearch();
            }
        });
    </script>
</body>
</html>
