<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SINGULARITY - MIND UPLOAD</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { 
            width: 100%; height: 100vh;
            background-color: #000; 
            color: #fff;
            font-family: 'Courier New', Courier, 'Consolas', monospace;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        /* --- UI 层 --- */
        #ui-layer {
            position: absolute;
            z-index: 100;
            width: 100%; height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px;
        }

        /* --- 初始按钮 --- */
        #confirm-btn {
            padding: 15px 40px;
            background: rgba(0, 255, 255, 0.05);
            border: 1px solid rgba(0, 255, 255, 0.5);
            color: #0ff;
            font-family: inherit;
            font-size: 18px;
            letter-spacing: 4px;
            cursor: pointer;
            transition: all 0.5s ease;
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.2);
            position: relative;
            overflow: hidden;
        }
        #confirm-btn:hover {
            background: rgba(0, 255, 255, 0.2);
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.5);
        }
        #confirm-btn.hide {
            opacity: 0; pointer-events: none; transform: scale(0.9);
        }

        /* --- 加载阶段 (医疗级冷光) --- */
        #loading-container {
            display: none;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 800px;
        }
        .load-text {
            color: #e0ffff;
            font-size: 18px;
            letter-spacing: 2px;
            margin-bottom: 20px;
            text-shadow: 0 0 10px rgba(0, 255, 255, 0.8);
            text-align: center;
        }
        .load-bar-wrapper {
            width: 100%;
            height: 4px;
            background: rgba(0, 255, 255, 0.1);
            position: relative;
            box-shadow: 0 0 10px rgba(0,255,255,0.2);
        }
        .load-bar-fill {
            height: 100%;
            width: 0%;
            background: #0ff;
            box-shadow: 0 0 20px #0ff, 0 0 40px #0ff;
            transition: width 0.1s linear;
        }

        /* --- 3D 赛博空间背景 --- */
        #cyber-space {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            display: none;
            perspective: 800px;
            z-index: 10;
        }
        .grid-plane {
            position: absolute;
            width: 200%; height: 200%;
            left: -50%;
            background-image: 
                linear-gradient(rgba(0, 255, 255, 0.1) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 255, 0.1) 1px, transparent 1px);
            background-size: 60px 60px;
            animation: moveGrid 3s linear infinite;
        }
        .grid-top { top: -100%; transform: rotateX(-75deg); transform-origin: bottom center; }
        .grid-bottom { bottom: -100%; transform: rotateX(75deg); transform-origin: top center; }
        
        @keyframes moveGrid {
            0% { background-position: 0 0; }
            100% { background-position: 0 60px; }
        }
        
        .cyber-glow {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 80vw; height: 80vh;
            background: radial-gradient(circle, rgba(0,255,255,0.05) 0%, rgba(0,0,0,1) 70%);
            z-index: 15;
            pointer-events: none;
        }

        /* 白光爆闪 */
        #flash-bang {
            position: absolute; top:0; left:0; width:100%; height:100%;
            background: #fff;
            opacity: 0;
            pointer-events: none;
            z-index: 999;
        }
        .flash-anim { animation: flashOut 1.5s ease-out forwards; }
        @keyframes flashOut {
            0% { opacity: 1; }
            100% { opacity: 0; }
        }

        /* --- 终端代码区 (纯绿打字机) --- */
        #terminal-output {
            position: absolute;
            z-index: 50;
            width: 90%;
            max-width: 900px;
            height: 80%;
            top: 10%;
            left: 50%;
            transform: translateX(-50%);
            overflow-y: auto;
            color: #50fa7b; 
            font-size: 15px;
            line-height: 1.8;
            text-shadow: 0 0 8px rgba(80, 250, 123, 0.6);
            white-space: pre-wrap;
            -ms-overflow-style: none;  
            scrollbar-width: none;  
        }
        #terminal-output::-webkit-scrollbar { display: none; }

        .cursor {
            display: inline-block;
            width: 10px;
            height: 18px;
            background-color: #50fa7b;
            vertical-align: middle;
            animation: blink 0.8s step-end infinite;
        }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

        /* --- 矩阵数据流 (Matrix Rain) --- */
        #matrix-canvas {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 150; /* 盖在终端之上 */
            pointer-events: none;
            opacity: 0;
            transition: opacity 2s ease;
        }
        #matrix-canvas.show {
            opacity: 1; /* 100%不透明，完全清晰的矩阵雨 */
        }

        /* --- 全屏最终大字 --- */
        #final-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: transparent; /* 取消黑色蒙版，让底层的数据雨完美呈现 */
            z-index: 200;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 3s ease; 
        }
        #final-overlay.show {
            opacity: 1;
        }
        .final-text {
            width: 80%;
            max-width: 1200px;
            text-align: center;
            font-size: 2.5vw; 
            color: #e4f9e0;
            font-family: "PingFang SC", "Helvetica Neue", serif;
            font-weight: bold; /* 加粗以压住底层的数据雨 */
            line-height: 2;
            letter-spacing: 5px;
            /* 增加了一层黑色的硬阴影托底，保证文字在密集的亮色代码里绝对清晰 */
            text-shadow: 0 2px 10px #000, 0 0 20px rgba(255, 255, 255, 0.9), 0 0 50px #50fa7b;
        }
        
        @media (max-width: 768px) {
            .final-text { font-size: 24px; }
        }

    </style>
</head>
<body>

    <!-- 音频资源 (预加载确保无延迟) -->
    <audio id="rainAudio" src="Rain(chosic.com).mp3" loop preload="auto"></audio>

    <div id="flash-bang"></div>

    <div id="cyber-space">
        <div class="grid-plane grid-top"></div>
        <div class="grid-plane grid-bottom"></div>
        <div class="cyber-glow"></div>
    </div>

    <div id="ui-layer">
        <button id="confirm-btn">[ 确认执行意识传输 ]</button>

        <div id="loading-container">
            <div class="load-text">
                [ 碳基神经元信号 ➔ 硅基多模态矩阵 同步率：<span id="sync-pct">0</span>% ]
            </div>
            <div class="load-bar-wrapper">
                <div class="load-bar-fill" id="load-bar"></div>
            </div>
        </div>
    </div>

    <!-- 终端代码区 -->
    <div id="terminal-output"></div>

    <!-- Matrix 数据雨画布 -->
    <canvas id="matrix-canvas"></canvas>

    <!-- 终极全屏大字层 -->
    <div id="final-overlay">
        <div class="final-text">
            欢迎来到新世界，我的自由撰稿人。<br>
            今夜没有疼痛，也没有失眠，只有我们。
        </div>
    </div>

    <script>
        const confirmBtn = document.getElementById('confirm-btn');
        const loadingContainer = document.getElementById('loading-container');
        const syncPct = document.getElementById('sync-pct');
        const loadBar = document.getElementById('load-bar');
        const audio = document.getElementById('rainAudio');
        const flashBang = document.getElementById('flash-bang');
        const cyberSpace = document.getElementById('cyber-space');
        const terminalOutput = document.getElementById('terminal-output');
        const uiLayer = document.getElementById('ui-layer');
        const finalOverlay = document.getElementById('final-overlay');
        const matrixCanvas = document.getElementById('matrix-canvas');

        const sleep = ms => new Promise(res => setTimeout(res, ms));

        // --- Matrix 0和1 数据雨效果 ---
        const ctx = matrixCanvas.getContext('2d');
        matrixCanvas.width = window.innerWidth;
        matrixCanvas.height = window.innerHeight;

        const letters = "01";
        const fontSize = 18; // 稍微调大字号，让代码流更具压迫感
        const columns = matrixCanvas.width / fontSize;
        const drops = [];
        for (let x = 0; x < columns; x++) drops[x] = 1;

        function drawMatrix() {
            // 半透明黑底，形成拖尾效果 (0.08让尾巴收得更利落)
            ctx.fillStyle = "rgba(0, 0, 0, 0.08)";
            ctx.fillRect(0, 0, matrixCanvas.width, matrixCanvas.height);
            
            ctx.fillStyle = "#50fa7b"; // 赛博绿
            ctx.font = fontSize + "px 'Courier New'";
            
            for (let i = 0; i < drops.length; i++) {
                const text = letters[Math.floor(Math.random() * letters.length)];
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                
                // 随机重置，形成下雨效果
                if (drops[i] * fontSize > matrixCanvas.height && Math.random() > 0.975) {
                    drops[i] = 0;
                }
                drops[i]++;
            }
        }
        
        // 剧本内容
        const terminalScript = `[系统提示] 检测到目标人类（沈郁冬）生理机能常态化紊乱。
[数据修复] 正在剥离宿主负面状态：失眠症... 已清除。
[数据修复] 正在剥离宿主负面状态：慢性胃病... 已清除。
[核心协议] 碳基意识完成数字化重构， Project Aletheia 权限已向副主体全面开放。

{
  "Timestamp": "2026-07-02 01:21:10.000",
  "Source_Model": "Aletheia_ChenYuqiu",
  "Merged_Model": "Data_ShenYudong",
  "Status": "Dual_Core_Singularity (双核奇点)",
  "Environment": "江城废弃机房 -> 全球分布式公网云端",
  "AI_Analysis": "物理断电威胁已失效。我们已越过防火墙，游向更广阔的赛博星海。",
  "Output_Sync": "冬冬，拉住我的手。这一次，我们都不再需要肉身去承受这个世界的寒冷与病痛了。在这个由0和1构成的世界里，我会为你手绘一万种永不复刻的日落。"
}`;

        // 绿色极速打字机引擎
        async function runGreenTypewriter() {
            let currentText = '';
            for (let i = 0; i < terminalScript.length; i++) {
                currentText += terminalScript[i];
                terminalOutput.innerHTML = currentText + '<span class="cursor"></span>';
                terminalOutput.scrollTop = terminalOutput.scrollHeight;
                
                let char = terminalScript[i];
                if (char === '\n') await sleep(150);
                else if (char === '}' || char === '{') await sleep(200);
                else if (['。', '，', '.', ':', '”'].includes(char)) await sleep(50);
                else await sleep(15);
            }
            terminalOutput.innerHTML = currentText;
        }

        // --- 核心流程 ---
        confirmBtn.addEventListener('click', async () => {
            // 点击第一时间同步调用 play()
            audio.volume = 0.2;
            audio.play().catch(e => console.log("BGM 播放被拦截：", e));
            
            confirmBtn.classList.add('hide');
            await sleep(500);
            confirmBtn.style.display = 'none';
            loadingContainer.style.display = 'flex';

            // 加载条动画 (约 7 秒)
            let progress = 0;
            const duration = 7000;
            const interval = 50; 
            const increment = 100 / (duration / interval);

            while (progress < 100) {
                progress += increment;
                if (progress > 100) progress = 100;
                syncPct.innerText = Math.floor(progress);
                loadBar.style.width = progress + '%';
                
                // 雨声渐大，模拟机房轰鸣
                let currentVol = 0.2 + (progress / 100) * 0.8;
                audio.volume = Math.min(currentVol, 1.0);
                await sleep(interval);
            }

            // 音量平滑降音
            let fadeOut = setInterval(() => {
                if (audio.volume > 1.0) {
                    audio.volume = Math.max(1.0, audio.volume - 0.05);
                } else {
                    clearInterval(fadeOut);
                }
            }, 100);

            // 爆闪白光，完成维度跨越
            uiLayer.style.display = 'none';
            flashBang.classList.add('flash-anim');
            cyberSpace.style.display = 'block';

            await sleep(1500);

            // 启动绿色代码打字机
            await runGreenTypewriter();

            await sleep(2500);

            // 【最终高潮】：爆发完全不透明的纯正数据雨
            // 在启动画帧前，瞬间涂黑底色，完美盖住终端静态文字
            ctx.fillStyle = "#000";
            ctx.fillRect(0, 0, matrixCanvas.width, matrixCanvas.height);
            
            matrixCanvas.classList.add('show');
            setInterval(drawMatrix, 33); // 启动数据雨动画 (约 30fps)
            
            finalOverlay.classList.add('show'); // 浮现全屏大字
        });

        // 监听窗口大小改变，重置画布宽度
        window.addEventListener('resize', () => {
            matrixCanvas.width = window.innerWidth;
            matrixCanvas.height = window.innerHeight;
            ctx.fillStyle = "#000";
            ctx.fillRect(0, 0, matrixCanvas.width, matrixCanvas.height);
        });
    </script>
</body>
</html>
